name: Build

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Ryazhenka Updater
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Mark workspace as safe for git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/lib/borealis"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/TegraExplorer"

      - name: Verify Ryazhenka patches are intact
        run: bash scripts/ryazhenka/apply-patches.sh --check

      - name: Install host dependencies
        run: |
          apt-get update -y
          apt-get install -y build-essential zip python3

      - name: Build aiosu-forwarder
        run: make -C aiosu-forwarder -f Makefile

      - name: Build ryazhenka-updater.nro
        run: make -j"$(nproc)"

      - name: Pack release zip
        run: bash scripts/ryazhenka/pack-release.sh

      - name: Upload .nro artifact
        uses: actions/upload-artifact@v4
        with:
          name: ryazhenka-updater-nro
          path: ryazhenka-updater.nro
          if-no-files-found: error

      - name: Upload release zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ryazhenka-updater-zip
          path: Ryazhenka_AIO.zip
          if-no-files-found: error

      - name: Publish rolling "nightly" release (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly build — ${{ github.sha }}"
          body: |
            Automatic rolling build from the latest commit on `main`.

            * Commit: `${{ github.sha }}`
            * Built: ${{ github.event.head_commit.timestamp }}

            For stable releases see https://github.com/Dimasick-git/AIO-Switch-Updater/releases
          prerelease: true
          make_latest: false
          files: |
            ryazhenka-updater.nro
            Ryazhenka_AIO.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
