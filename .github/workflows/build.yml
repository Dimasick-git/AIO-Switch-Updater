name: Build

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
  workflow_dispatch:
    inputs:
      skip_release:
        description: "Build without publishing a GitHub Release (for smoke tests)"
        type: boolean
        default: false

jobs:
  build:
    name: Build Ryazhenka Updater
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Mark workspace as safe for git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/lib/borealis"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/TegraExplorer"

      - name: Verify Ryazhenka patches are intact
        run: bash scripts/ryazhenka/apply-patches.sh --check

      - name: Install host dependencies
        run: |
          # devkitPro's apt repo is fronted by Cloudflare and occasionally
          # returns 522 timeouts — retry a few times so one transient blip
          # doesn't tank the whole build.
          for i in 1 2 3 4 5; do
            if apt-get -o Acquire::Retries=3 update -y; then
              break
            fi
            echo "apt-get update failed (attempt $i/5); retrying in $((i*5))s"
            sleep $((i*5))
          done
          apt-get install -y build-essential zip python3

      - name: Read APP_VERSION from Makefile
        id: version
        run: |
          ver="$(grep -E '^APP_VERSION' Makefile | sed -E 's/^APP_VERSION[[:space:]]*:=[[:space:]]*//' | tr -d '[:space:]')"
          if [ -z "$ver" ]; then
            echo "APP_VERSION not found in Makefile" >&2
            exit 1
          fi
          tag="v${ver}"
          echo "APP_VERSION=${ver}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${tag}" >> "$GITHUB_ENV"
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          if git rev-parse --verify "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag ${tag} already exists — release publish step will be skipped. Bump APP_VERSION in Makefile to cut a new release."
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Will publish release ${tag}"
          fi

      - name: Build aiosu-forwarder
        run: make -C aiosu-forwarder -f Makefile

      - name: Build ryazhenka-updater.nro
        run: make -j"$(nproc)"

      - name: Pack release zip
        run: bash scripts/ryazhenka/pack-release.sh

      - name: Upload .nro artifact
        uses: actions/upload-artifact@v4
        with:
          name: ryazhenka-updater-nro
          path: ryazhenka-updater.nro
          if-no-files-found: error

      - name: Upload release zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ryazhenka-updater-zip
          path: Ryazhenka_AIO.zip
          if-no-files-found: error

      - name: Publish GitHub Release (main branch only, on APP_VERSION bump)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && github.event.inputs.skip_release != 'true' && steps.version.outputs.tag_exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            **Ряженка Updater ${{ steps.version.outputs.tag }}**

            * Версия: `${{ steps.version.outputs.version }}` (из `Makefile::APP_VERSION`)
            * Коммит: `${{ github.sha }}`
            * Сборка CI: №${{ github.run_number }}
            * Дата: ${{ github.event.head_commit.timestamp }}

            Установка: скачайте `Ryazhenka_AIO.zip` и распакуйте в корень SD,
            либо положите `ryazhenka-updater.nro` в `/switch/aio-switch-updater/`
            (имя на SD остаётся `aio-switch-updater.nro` для совместимости с
            внутриприложным апдейтером).

            Чтобы выпустить следующий релиз — поднимите `APP_VERSION` в
            `Makefile` и запушьте в main.
          prerelease: false
          make_latest: "true"
          files: |
            ryazhenka-updater.nro
            Ryazhenka_AIO.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
